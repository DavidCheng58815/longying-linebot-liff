<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>龍穎社小幫手｜活動報名</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --primary: #6b3fa0;
      --primary-dark: #4f2b79;
      --bg: #f6f3ee;
      --text: #2d2d2d;
      --muted: #666;
      --line: #eadff4;
      --danger: #d64545;
      --success: #2e9d50;
      --warning: #e09b22;
      --soft-purple: #f4f1fa;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: var(--primary);
      letter-spacing: 0.5px;
    }

    h2 {
      font-size: 18px;
      margin: 24px 0 12px;
      color: var(--primary-dark);
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .status-box {
      border-radius: 14px;
      padding: 14px 16px;
      margin: 16px 0;
      background: var(--soft-purple);
      border-left: 5px solid var(--primary);
      line-height: 1.6;
      font-size: 15px;
    }

    .status-success { background: #eef8f0; border-left-color: var(--success); }
    .status-warning { background: #fff7e6; border-left-color: var(--warning); }
    .status-error { background: #fff0f0; border-left-color: var(--danger); }

    label {
      display: block;
      font-weight: bold;
      margin: 18px 0 8px;
    }

    input,
    select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 16px;
      background: #fff;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .primary { background: var(--primary); color: #fff; }
    .secondary { background: #e8e1f1; color: var(--primary-dark); }
    .danger { background: var(--danger); color: #fff; }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .hint,
    .mini-note,
    .footer {
      color: #777;
      line-height: 1.5;
    }

    .hint { margin-top: 8px; font-size: 13px; }
    .mini-note { margin-top: 10px; font-size: 13px; }

    .loading {
      text-align: center;
      color: var(--muted);
      padding: 24px 0;
      line-height: 1.8;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      text-align: center;
    }

    .events-box { margin-top: 20px; }

    .summary-box {
      background: #fbf9ff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin: 8px 0 16px;
    }

    .summary-title {
      font-weight: bold;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .summary-item {
      background: #fff;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid #f0e8f8;
    }

    .summary-number {
      font-size: 20px;
      font-weight: bold;
      color: var(--primary);
    }

    .summary-label {
      color: #777;
      font-size: 13px;
      margin-top: 2px;
    }

    .event-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin: 14px 0;
      background: #fff;
    }

    .event-title {
      font-weight: bold;
      font-size: 17px;
      color: #3a2a4d;
      margin-bottom: 8px;
    }

    .event-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .event-status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--soft-purple);
      color: var(--primary);
      font-size: 13px;
      margin: 8px 0;
    }

    .my-status {
      margin-top: 10px;
      font-weight: bold;
      color: #333;
    }

    .event-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .event-actions button {
      padding: 11px 8px;
      font-size: 14px;
    }

    details.event-details {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }

    details.event-details summary {
      cursor: pointer;
      color: var(--primary-dark);
      font-weight: bold;
      font-size: 14px;
      list-style: none;
    }

    details.event-details summary::-webkit-details-marker {
      display: none;
    }

    details.event-details summary::after {
      content: "＋";
      float: right;
      color: var(--primary);
    }

    details.event-details[open] summary::after {
      content: "－";
    }

    .detail-content {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }


    .detail-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .detail-link {
      flex: 1;
      display: block;
      border-radius: 12px;
      padding: 12px 10px;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      box-sizing: border-box;
    }

    .detail-link.primary {
      background: var(--primary);
      color: #fff;
    }

    .detail-link.secondary {
      background: #e8e1f1;
      color: var(--primary-dark);
    }

    .guest-box {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed var(--line);
    }

    .guest-title {
      font-weight: bold;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }

    .guest-input-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .guest-input-row input {
      flex: 1;
      padding: 11px 12px;
      font-size: 14px;
    }

    .guest-input-row button {
      width: 110px;
      flex: none;
      padding: 11px 8px;
      font-size: 14px;
    }

    .guest-list {
      margin-top: 10px;
      font-size: 14px;
      color: #555;
    }

    .guest-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #f1edf6;
    }

    .guest-item button {
      width: 80px;
      flex: none;
      padding: 8px 6px;
      font-size: 13px;
    }

    .hidden { display: none; }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>龍穎社小幫手</h1>
      <p class="subtitle">
        請完成社友身分綁定。綁定申請送出後，需由執秘審核通過，才能使用活動報名、取消與來賓登記功能。
      </p>

      <div id="loading" class="loading">系統載入中，請稍候...</div>
      <div id="statusBox" class="status-box hidden"></div>

      <div id="bindForm" class="hidden">
        <label for="searchInput">搜尋社友姓名或英文暱稱</label>
        <input id="searchInput" type="text" placeholder="例如：大D、David、Jessica、王小明" />

        <div class="hint">
          名單顯示格式為「中文姓名｜英文暱稱」。若英文暱稱重複，請以中文姓名確認。
        </div>

        <label for="memberSelect">請選擇您的社友姓名</label>
        <select id="memberSelect">
          <option value="">請先搜尋或選擇社友</option>
        </select>

        <div class="button-row">
          <button id="submitBtn" class="primary">送出綁定申請</button>
        </div>
      </div>

      <div id="pendingBox" class="hidden">
        <div class="button-row">
          <button id="cancelBtn" class="danger">取消申請，重新選擇</button>
        </div>
      </div>

      <div id="eventsBox" class="events-box hidden">
        <h2>活動列表</h2>
        <div id="summaryBox" class="summary-box hidden"></div>
        <div id="eventsContent" class="mini-note">活動資料載入中...</div>
      </div>

      <div id="reloadBox" class="button-row hidden">
        <button id="reloadBtn" class="secondary">重新整理狀態</button>
      </div>

      <div class="footer">
        龍穎社活動報名與來賓管理系統｜v3.8 效能優化版
      </div>
    </div>
  </div>

  <script>
    const CONFIG = {
      LIFF_ID: '2010401579-60qfBgC0',
      GAS_API_URL: 'https://script.google.com/macros/s/AKfycbwZ-0XcZmi7xy6K1VMgMzXpi6s_XNAGGf_Yjml97nyKZaJufQYfpPeP6PlLxIyYPRojHw/exec',
      // EDM 頁面採 event_id 自動讀圖，例如 edm.html?event_id=E0001 -> assets/edm/E0001.jpg
      EDM_PAGE_URL: './edm.html'
    };

    const state = {
      members: [],
      profile: null,
      bindingStatus: null,
      events: [],
      eventMeta: {}
    };

    const els = {};

    window.addEventListener('load', init);

    function init() {
      cacheElements();
      bindStaticEvents();
      main();
    }

    function cacheElements() {
      [
        'loading',
        'statusBox',
        'bindForm',
        'pendingBox',
        'eventsBox',
        'summaryBox',
        'eventsContent',
        'reloadBox',
        'searchInput',
        'memberSelect',
        'submitBtn',
        'cancelBtn',
        'reloadBtn'
      ].forEach(id => {
        els[id] = document.getElementById(id);
      });
    }

    function bindStaticEvents() {
      els.searchInput.addEventListener('input', renderMemberOptions);
      els.submitBtn.addEventListener('click', submitBindingRequest);
      els.cancelBtn.addEventListener('click', cancelBindingRequest);
      els.reloadBtn.addEventListener('click', main);
    }

    async function main() {
      resetView();
      showLoading('正在初始化 LINE 環境，請稍候...');

      try {
        if (!CONFIG.LIFF_ID) throw new Error('尚未設定 LIFF_ID。');
        if (!CONFIG.GAS_API_URL) throw new Error('尚未設定 GAS_API_URL。');

        await liff.init({ liffId: CONFIG.LIFF_ID });

        showLoading('正在確認 LINE 登入狀態...');

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        state.profile = await liff.getProfile();

        showLoading('正在確認身分綁定狀態...');

        // v3.5 優化：先只查綁定狀態。
        // 已綁定或待審核者不需要每次都載入全部社友名單。
        const statusResult = await callGasApi('check_binding_status', {});
        if (!statusResult.success) throw new Error(statusResult.error || '取得綁定狀態失敗。');

        state.profile = statusResult.profile || state.profile;
        state.bindingStatus = statusResult.bindingStatus;
        state.members = [];

        const bindingStatus = state.bindingStatus && state.bindingStatus.status;

        if (!bindingStatus || bindingStatus === 'none') {
          showLoading('正在載入社友名單...');

          const memberResult = await callGasApi('get_members', {});
          if (!memberResult.success) throw new Error(memberResult.error || '取得社友名單失敗。');

          state.members = memberResult.members || [];
          state.bindingStatus = memberResult.bindingStatus || state.bindingStatus;
        }

        renderByBindingStatus();

      } catch (error) {
        showStatus('系統錯誤：' + error.message, 'error');
        console.error(error);
      } finally {
        hideLoading();
      }
    }

    function renderByBindingStatus() {
      hide(els.bindForm, els.pendingBox, els.eventsBox);
      show(els.reloadBox);

      const status = state.bindingStatus && state.bindingStatus.status;

      if (status === 'active') {
        showStatus(
          '已完成身分綁定<br>' +
          '社友：' + escapeHtml(state.bindingStatus.member_name || '') + '<br>' +
          '您已可以使用活動報名、取消與來賓登記功能。',
          'success'
        );

        show(els.eventsBox);
        loadMyEvents();
        return;
      }

      if (status === 'pending') {
        showStatus(
          '已有身分綁定申請待審核<br>' +
          '申請社友：' + escapeHtml(state.bindingStatus.requested_member_name || '') + '<br>' +
          '請等待執秘審核。若選錯姓名，可取消後重新選擇。',
          'warning'
        );
        show(els.pendingBox);
        return;
      }

      showStatus(
        '目前尚未完成身分綁定。<br>' +
        'LINE 顯示名稱：' + escapeHtml(state.profile.displayName || '') + '<br>' +
        '請選擇您的社友姓名後送出申請。',
        'normal'
      );

      show(els.bindForm);
      renderMemberOptions();
    }

    function renderMemberOptions() {
      const keyword = normalize(els.searchInput.value);
      const filtered = state.members.filter(member => {
        const text = normalize([
          member.member_name,
          member.nickname,
          member.display_name_for_liff,
          member.member_no
        ].join(' '));
        return !keyword || text.includes(keyword);
      });

      els.memberSelect.innerHTML = '';

      const defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = filtered.length ? '請選擇社友' : '查無符合社友，請重新搜尋';
      els.memberSelect.appendChild(defaultOption);

      filtered.forEach(member => {
        const option = document.createElement('option');
        option.value = member.member_id;
        option.textContent = member.display_name_for_liff;
        els.memberSelect.appendChild(option);
      });
    }

    async function submitBindingRequest() {
      const memberId = els.memberSelect.value;
      if (!memberId) {
        alert('請先選擇您的社友姓名。');
        return;
      }

      const selectedMember = state.members.find(member => member.member_id === memberId);
      const name = selectedMember ? selectedMember.display_name_for_liff : memberId;

      const confirmed = confirm(
        '請確認是否送出綁定申請：\n\n' +
        name + '\n\n' +
        '送出後需等待執秘審核。'
      );

      if (!confirmed) return;

      await runAction('正在送出申請...', async () => {
        const result = await callGasApi('submit_binding_request', { member_id: memberId });
        if (!result.success) throw new Error(result.message || result.error || '送出申請失敗。');

        alert(result.message || '已送出身分綁定申請。');
        await main();
      });
    }

    async function cancelBindingRequest() {
      const confirmed = confirm('確定要取消目前待審核的綁定申請嗎？\n\n取消後可以重新選擇社友姓名。');
      if (!confirmed) return;

      await runAction('正在取消申請...', async () => {
        const result = await callGasApi('cancel_binding_request', {});
        if (!result.success) throw new Error(result.message || result.error || '取消申請失敗。');

        alert(result.message || '已取消申請。');
        await main();
      });
    }

    async function loadMyEvents() {
      els.eventsContent.innerHTML = '正在讀取近期活動與您的來賓資料...';
      hide(els.summaryBox);

      try {
        showLoading('正在整理您的活動與來賓資料...');

        const result = await callGasApi('get_my_events', {});
        if (!result.success) throw new Error(result.message || result.error || '取得活動資料失敗。');

        state.events = result.events || [];
        state.eventMeta = result.meta || {};
        renderSummary();
        renderEvents();

      } catch (error) {
        els.eventsContent.innerHTML = '<div class="status-box status-error">活動資料載入失敗：' + escapeHtml(error.message) + '</div>';
        console.error(error);
      }
    }

    function renderSummary() {
      if (!state.events.length) {
        hide(els.summaryBox);
        return;
      }

      const summary = calculateSummary(state.events);

      els.summaryBox.innerHTML = `
        <div class="summary-title">我的報名總覽｜近期活動</div>
        <div class="summary-grid">
          ${buildSummaryItem(summary.joined, '已參加')}
          ${buildSummaryItem(summary.noResponse, '未回覆')}
          ${buildSummaryItem(summary.notJoin, '不參加')}
          ${buildSummaryItem(summary.myGuests, '我的來賓')}
        </div>
      `;

      show(els.summaryBox);
    }

    function calculateSummary(events) {
      return events.reduce((acc, event) => {
        const status = event.my_registration_status || '未回覆';

        if (status === '參加') acc.joined += 1;
        else if (status === '不參加') acc.notJoin += 1;
        else if (status === '已取消') acc.cancelled += 1;
        else acc.noResponse += 1;

        acc.myGuests += Number(event.my_guest_count || 0);
        return acc;
      }, {
        joined: 0,
        notJoin: 0,
        cancelled: 0,
        noResponse: 0,
        myGuests: 0
      });
    }

    function buildSummaryItem(number, label) {
      return `
        <div class="summary-item">
          <div class="summary-number">${escapeHtml(number)}</div>
          <div class="summary-label">${escapeHtml(label)}</div>
        </div>
      `;
    }

    function renderEvents() {
      if (!state.events.length) {
        els.eventsContent.innerHTML = '目前近期沒有可顯示的活動。';
        return;
      }

      els.eventsContent.innerHTML = state.events.map(event => `
        <div class="event-card" data-event-id="${escapeAttr(event.event_id)}">
          <div class="event-title">${escapeHtml(event.event_name)}</div>
          <div class="event-status">${escapeHtml(getEventStatusLabel(event.status))}</div>

          <div class="event-meta">
            日期：${escapeHtml(event.event_date || '未設定')}<br>
            時間：${escapeHtml(buildTimeText(event))}<br>
            地點：${escapeHtml(event.location || '未設定')}<br>
            報名截止：${escapeHtml(event.registration_deadline || '未設定')}<br>
            取消截止：${escapeHtml(event.cancel_deadline || '未設定')}
          </div>

          <div class="my-status">
            我的狀態：${escapeHtml(event.my_registration_status || '未回覆')}
            ${Number(event.my_guest_count) ? `｜我的來賓：${escapeHtml(event.my_guest_count)} 位` : ''}
          </div>

          ${buildEventActions(event)}
          ${buildEventDetails(event)}
          ${buildGuestManager(event)}
        </div>
      `).join('');

      bindEventButtons();
      bindGuestButtons();
    }

    function buildEventActions(event) {
      const status = event.my_registration_status || '未回覆';

      if (status === '參加') {
        if (event.can_cancel) {
          return `
            <div class="event-actions">
              <button class="danger event-action-btn" data-event-id="${escapeAttr(event.event_id)}" data-status="已取消">
                取消報名
              </button>
            </div>
          `;
        }

        return '<div class="mini-note">您已報名此活動，且已超過取消期限。若需異動請聯繫執秘。</div>';
      }

      if (!event.can_register) {
        return `<div class="mini-note">${escapeHtml(event.register_message || '此活動目前不可操作。')}</div>`;
      }

      const buttons = [`
        <button class="primary event-action-btn" data-event-id="${escapeAttr(event.event_id)}" data-status="參加">
          參加
        </button>
      `];

      if (status !== '不參加') {
        buttons.push(`
          <button class="secondary event-action-btn" data-event-id="${escapeAttr(event.event_id)}" data-status="不參加">
            不參加
          </button>
        `);
      }

      return `<div class="event-actions">${buttons.join('')}</div>`;
    }

    function buildEventDetails(event) {
      const edmUrl = buildEdmUrl(event.event_id);

      return `
        <details class="event-details">
          <summary>查看活動詳情</summary>
          <div class="detail-content">
            類型：${escapeHtml(event.event_type || '未設定')}<br>
            例會次數：${escapeHtml(event.event_no || '未設定')}<br>
            主題：${escapeHtml(event.topic || '未設定')}<br>
            講師：${escapeHtml(event.speaker || '未設定')}<br>
            費用：${escapeHtml(event.fee || '未設定')}<br>
            目前人數：社友 ${escapeHtml(event.member_count)} 位、來賓 ${escapeHtml(event.guest_count)} 位，總計 ${escapeHtml(event.total_count)} 位<br>
            來賓設定：${isTrue(event.guest_allowed) ? '開放' : '不開放'}${event.guest_limit ? '｜每位上限：' + escapeHtml(event.guest_limit) : ''}${event.max_capacity ? '｜總人數上限：' + escapeHtml(event.max_capacity) : ''}
            ${event.announcement_text ? '<br>公告：' + escapeHtml(event.announcement_text) : ''}

            <div class="detail-actions">
              <a class="detail-link primary" href="${escapeAttr(edmUrl)}">
                查看活動 EDM
              </a>
            </div>
          </div>
        </details>
      `;
    }

    function buildEdmUrl(eventId) {
      const safeEventId = String(eventId || '').trim().toUpperCase();
      const separator = CONFIG.EDM_PAGE_URL.includes('?') ? '&' : '?';
      return CONFIG.EDM_PAGE_URL + separator + 'event_id=' + encodeURIComponent(safeEventId);
    }

    function bindEventButtons() {
      els.eventsContent.querySelectorAll('.event-action-btn').forEach(button => {
        button.addEventListener('click', async () => {
          await submitMemberRegistration(button.getAttribute('data-event-id'), button.getAttribute('data-status'));
        });
      });
    }

    async function submitMemberRegistration(eventId, status) {
      const event = findEvent(eventId);
      const eventName = event ? event.event_name : eventId;

      const confirmed = confirm(
        status === '已取消'
          ? '確定要取消報名？\n\n活動：' + eventName
          : '確定要送出活動狀態？\n\n活動：' + eventName + '\n狀態：' + status
      );

      if (!confirmed) return;

      await runAction('正在更新活動狀態...', async () => {
        const result = await callGasApi('submit_member_registration', { event_id: eventId, status });
        if (!result.success) throw new Error(result.message || result.error || '更新失敗。');

        alert(result.message || '已更新活動狀態。');
        await loadMyEvents();
      });
    }

    function buildGuestManager(event) {
      if (!isTrue(event.guest_allowed)) return '';

      const canAddGuest = Boolean(event.can_add_guest ?? event.can_register);
      const canCancelGuest = Boolean(event.can_cancel_guest ?? event.can_cancel);
      const guests = Array.isArray(event.my_guests) ? event.my_guests : [];

      const inputHtml = canAddGuest
        ? `
          <div class="guest-input-row">
            <input type="text" placeholder="輸入來賓姓名" data-guest-input-event-id="${escapeAttr(event.event_id)}">
            <button class="primary add-guest-btn" data-event-id="${escapeAttr(event.event_id)}">
              新增來賓
            </button>
          </div>
        `
        : `<div class="mini-note">${escapeHtml(event.add_guest_message || '此活動目前不可新增來賓。')}</div>`;

      const cancelNote = (!canCancelGuest && guests.length)
        ? '<div class="mini-note">目前已超過來賓取消期限，如需異動請聯繫執秘。</div>'
        : '';

      return `
        <div class="guest-box" data-guest-event-id="${escapeAttr(event.event_id)}">
          <div class="guest-title">我的來賓</div>
          ${inputHtml}
          ${cancelNote}
          <div class="guest-list" data-guest-list-event-id="${escapeAttr(event.event_id)}">
            ${buildGuestListHtml(event, guests, canCancelGuest)}
          </div>
        </div>
      `;
    }

    function buildGuestListHtml(event, guests, canCancelGuest) {
      if (!guests.length) {
        return '<div class="mini-note">目前尚未登記來賓。</div>';
      }

      return guests.map(guest => {
        const cancelButton = canCancelGuest
          ? `
            <button class="danger cancel-guest-btn"
              data-event-id="${escapeAttr(event.event_id)}"
              data-guest-id="${escapeAttr(guest.guest_id)}"
              data-guest-name="${escapeAttr(guest.guest_name)}">
              取消
            </button>
          `
          : '';

        return `
          <div class="guest-item">
            <span>${escapeHtml(guest.guest_name)}</span>
            ${cancelButton}
          </div>
        `;
      }).join('');
    }

    function bindGuestButtons() {
      els.eventsContent.querySelectorAll('.add-guest-btn').forEach(button => {
        button.addEventListener('click', async () => addGuest(button.getAttribute('data-event-id')));
      });

      els.eventsContent.querySelectorAll('.cancel-guest-btn').forEach(button => {
        button.addEventListener('click', async () => {
          await cancelGuest(
            button.getAttribute('data-event-id'),
            button.getAttribute('data-guest-id'),
            button.getAttribute('data-guest-name')
          );
        });
      });
    }

    async function addGuest(eventId) {
      const input = queryByData('guest-input-event-id', eventId);
      if (!input) return;

      const guestName = input.value.trim();
      if (!guestName) {
        alert('請先輸入來賓姓名。');
        return;
      }

      const event = findEvent(eventId);
      const eventName = event ? event.event_name : eventId;

      const confirmed = confirm(
        '確定要新增來賓？\n\n' +
        '活動：' + eventName + '\n' +
        '來賓：' + guestName
      );

      if (!confirmed) return;

      await runAction('正在新增來賓...', async () => {
        const result = await callGasApi('add_guest_registration', { event_id: eventId, guest_name: guestName });
        if (!result.success) throw new Error(result.message || result.error || '新增來賓失敗。');

        alert(result.message || '已新增來賓。');
        await loadMyEvents();
      });
    }

    async function cancelGuest(eventId, guestId, guestName) {
      const confirmed = confirm('確定要取消這位來賓？\n\n來賓：' + guestName);
      if (!confirmed) return;

      await runAction('正在取消來賓...', async () => {
        const result = await callGasApi('cancel_guest_registration', { guest_id: guestId });
        if (!result.success) throw new Error(result.message || result.error || '取消來賓失敗。');

        alert(result.message || '已取消來賓。');
        await loadMyEvents();
      });
    }

    async function callGasApi(action, payload) {
      const accessToken = liff.getAccessToken();
      if (!accessToken) throw new Error('無法取得 LINE access token，請重新開啟頁面。');

      const response = await fetch(CONFIG.GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, access_token: accessToken, ...payload }),
        redirect: 'follow'
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error('GAS 回傳內容不是 JSON：' + text.slice(0, 200));
      }
    }

    async function runAction(loadingText, fn) {
      setButtonsDisabled(true);
      showLoading(loadingText);

      try {
        await fn();
      } catch (error) {
        alert(error.message || '操作失敗。');
        console.error(error);
      } finally {
        setButtonsDisabled(false);
        hideLoading();
      }
    }

    function resetView() {
      show(els.loading);
      hide(els.statusBox, els.bindForm, els.pendingBox, els.eventsBox, els.reloadBox);
    }

    function showLoading(message) {
      els.loading.textContent = message;
      show(els.loading);
    }

    function hideLoading() { hide(els.loading); }

    function showStatus(message, type) {
      els.statusBox.innerHTML = message;
      els.statusBox.className = 'status-box';

      if (type === 'success') els.statusBox.classList.add('status-success');
      if (type === 'warning') els.statusBox.classList.add('status-warning');
      if (type === 'error') els.statusBox.classList.add('status-error');

      show(els.statusBox);
    }

    function show(...elements) {
      elements.forEach(element => element && element.classList.remove('hidden'));
    }

    function hide(...elements) {
      elements.forEach(element => element && element.classList.add('hidden'));
    }

    function setButtonsDisabled(disabled) {
      document.querySelectorAll('button').forEach(button => { button.disabled = disabled; });
    }

    function findEvent(eventId) {
      return state.events.find(event => event.event_id === eventId);
    }

    function buildTimeText(event) {
      const start = event.start_time || '';
      const end = event.end_time || '';

      if (start && end) return start + '–' + end;
      if (start) return start;
      if (end) return end;
      return '未設定';
    }

    function getEventStatusLabel(status) {
      const map = {
        draft: '草稿',
        preview: '活動預告',
        open: '報名中',
        closing_soon: '即將截止',
        closed: '已截止',
        finalizing: '名單確認中',
        completed: '已完成'
      };

      return map[normalize(status)] || status || '未設定';
    }

    function queryByData(key, value) {
      return els.eventsContent.querySelector(`[data-${key}="${cssEscape(value)}"]`);
    }

    function isTrue(value) {
      return value === true || normalize(value) === 'true' || value === '是' || value === '1';
    }

    function normalize(value) {
      return String(value || '').trim().toLowerCase();
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#096;');
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value || '').replace(/"/g, '\\"');
    }
  </script>
</body>
</html>
