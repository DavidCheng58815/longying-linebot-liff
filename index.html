<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>龍穎社小幫手｜身分綁定</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: #f6f3ee;
      color: #2d2d2d;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 18px 40px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #6b3fa0;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 0 0 20px;
      color: #666;
      line-height: 1.6;
      font-size: 15px;
    }

    .status-box {
      border-radius: 14px;
      padding: 14px 16px;
      margin: 16px 0;
      background: #f4f1fa;
      border-left: 5px solid #6b3fa0;
      line-height: 1.6;
      font-size: 15px;
    }

    .status-success {
      background: #eef8f0;
      border-left-color: #2e9d50;
    }

    .status-warning {
      background: #fff7e6;
      border-left-color: #e09b22;
    }

    .status-error {
      background: #fff0f0;
      border-left-color: #d64545;
    }

    label {
      display: block;
      font-weight: bold;
      margin: 18px 0 8px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 16px;
      background: #fff;
    }

    .hint {
      margin-top: 8px;
      color: #777;
      font-size: 13px;
      line-height: 1.5;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 14px 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #6b3fa0;
      color: white;
    }

    .secondary {
      background: #e8e1f1;
      color: #4f2b79;
    }

    .danger {
      background: #d64545;
      color: white;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .loading {
      text-align: center;
      color: #666;
      padding: 24px 0;
      line-height: 1.8;
    }

    .footer {
      margin-top: 18px;
      color: #888;
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>龍穎社小幫手</h1>
      <p class="subtitle">
        請完成社友身分綁定。綁定申請送出後，需由執秘審核通過，才能使用活動報名、取消與來賓登記功能。
      </p>

      <div id="loading" class="loading">
        系統載入中，請稍候...
      </div>

      <div id="statusBox" class="status-box hidden"></div>

      <div id="bindForm" class="hidden">
        <label for="searchInput">搜尋社友姓名或英文暱稱</label>
        <input id="searchInput" type="text" placeholder="例如：大D、David、Jessica、王小明" />

        <div class="hint">
          名單顯示格式為「中文姓名｜英文暱稱」。若英文暱稱重複，請以中文姓名確認。
        </div>

        <label for="memberSelect">請選擇您的社友姓名</label>
        <select id="memberSelect">
          <option value="">請先搜尋或選擇社友</option>
        </select>

        <div class="button-row">
          <button id="submitBtn" class="primary">送出綁定申請</button>
        </div>
      </div>

      <div id="pendingBox" class="hidden">
        <div class="button-row">
          <button id="cancelBtn" class="danger">取消申請，重新選擇</button>
        </div>
      </div>

      <div id="reloadBox" class="button-row hidden">
        <button id="reloadBtn" class="secondary">重新整理狀態</button>
      </div>
    </div>

    <div class="footer">
      龍穎社活動報名與來賓管理系統｜第一版測試
    </div>
  </div>

  <script>
    const CONFIG = {
      LIFF_ID: '請換成你的 LIFF ID',
      GAS_API_URL: '請換成你的 GAS Web App URL'
    };

    let allMembers = [];
    let currentProfile = null;
    let currentBindingStatus = null;

    const loading = document.getElementById('loading');
    const statusBox = document.getElementById('statusBox');
    const bindForm = document.getElementById('bindForm');
    const pendingBox = document.getElementById('pendingBox');
    const reloadBox = document.getElementById('reloadBox');

    const searchInput = document.getElementById('searchInput');
    const memberSelect = document.getElementById('memberSelect');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const reloadBtn = document.getElementById('reloadBtn');

    window.addEventListener('load', main);
    searchInput.addEventListener('input', renderMemberOptions);
    submitBtn.addEventListener('click', submitBindingRequest);
    cancelBtn.addEventListener('click', cancelBindingRequest);
    reloadBtn.addEventListener('click', main);

    async function main() {
      resetView();
      showLoading('系統載入中，請稍候...');

      try {
        if (!CONFIG.LIFF_ID || CONFIG.LIFF_ID.includes('請換成')) {
          throw new Error('尚未設定 LIFF_ID。請先在 index.html 裡填入 LIFF ID。');
        }

        if (!CONFIG.GAS_API_URL || CONFIG.GAS_API_URL.includes('https://script.google.com/macros/s/AKfycbwZ-0XcZmi7xy6K1VMgMzXpi6s_XNAGGf_Yjml97nyKZaJufQYfpPeP6PlLxIyYPRojHw/exec')) {
          throw new Error('尚未設定 GAS_API_URL。請先在 index.html 裡填入 GAS Web App URL。');
        }

        await liff.init({ liffId: CONFIG.LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }

        currentProfile = await liff.getProfile();

        const result = await callGasApi('get_members', {});
        if (!result.success) {
          throw new Error(result.error || '取得社友名單失敗。');
        }

        allMembers = result.members || [];
        currentBindingStatus = result.bindingStatus;

        renderByBindingStatus();

      } catch (error) {
        showStatus('系統錯誤：' + error.message, 'error');
        console.error(error);
      } finally {
        hideLoading();
      }
    }

    function renderByBindingStatus() {
      bindForm.classList.add('hidden');
      pendingBox.classList.add('hidden');
      reloadBox.classList.remove('hidden');

      const status = currentBindingStatus && currentBindingStatus.status;

      if (status === 'active') {
        showStatus(
          '已完成身分綁定<br>' +
          '社友：' + escapeHtml(currentBindingStatus.member_name || '') + '<br>' +
          '您已可以使用活動報名、取消與來賓登記功能。',
          'success'
        );
        return;
      }

      if (status === 'pending') {
        showStatus(
          '已有身分綁定申請待審核<br>' +
          '申請社友：' + escapeHtml(currentBindingStatus.requested_member_name || '') + '<br>' +
          '請等待執秘審核。若選錯姓名，可取消後重新選擇。',
          'warning'
        );
        pendingBox.classList.remove('hidden');
        return;
      }

      showStatus(
        '目前尚未完成身分綁定。<br>' +
        'LINE 顯示名稱：' + escapeHtml(currentProfile.displayName || '') + '<br>' +
        '請選擇您的社友姓名後送出申請。',
        'normal'
      );

      bindForm.classList.remove('hidden');
      renderMemberOptions();
    }

    function renderMemberOptions() {
      const keyword = normalize(searchInput.value);
      const filtered = allMembers.filter(member => {
        const text = normalize(
          [
            member.member_name,
            member.nickname,
            member.display_name_for_liff,
            member.member_no
          ].join(' ')
        );
        return !keyword || text.includes(keyword);
      });

      memberSelect.innerHTML = '';

      const defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = filtered.length
        ? '請選擇社友'
        : '查無符合社友，請重新搜尋';
      memberSelect.appendChild(defaultOption);

      filtered.forEach(member => {
        const option = document.createElement('option');
        option.value = member.member_id;
        option.textContent = member.display_name_for_liff;
        memberSelect.appendChild(option);
      });
    }

    async function submitBindingRequest() {
      const memberId = memberSelect.value;

      if (!memberId) {
        alert('請先選擇您的社友姓名。');
        return;
      }

      const selectedMember = allMembers.find(member => member.member_id === memberId);
      const name = selectedMember ? selectedMember.display_name_for_liff : memberId;

      const confirmed = confirm(
        '請確認是否送出綁定申請：\n\n' +
        name + '\n\n' +
        '送出後需等待執秘審核。'
      );

      if (!confirmed) return;

      setButtonsDisabled(true);
      showLoading('正在送出申請...');

      try {
        const result = await callGasApi('submit_binding_request', {
          member_id: memberId
        });

        if (!result.success) {
          throw new Error(result.message || result.error || '送出申請失敗。');
        }

        alert(result.message || '已送出身分綁定申請。');
        await main();

      } catch (error) {
        alert('送出失敗：' + error.message);
        console.error(error);
      } finally {
        setButtonsDisabled(false);
        hideLoading();
      }
    }

    async function cancelBindingRequest() {
      const confirmed = confirm(
        '確定要取消目前待審核的綁定申請嗎？\n\n取消後可以重新選擇社友姓名。'
      );

      if (!confirmed) return;

      setButtonsDisabled(true);
      showLoading('正在取消申請...');

      try {
        const result = await callGasApi('cancel_binding_request', {});

        if (!result.success) {
          throw new Error(result.message || result.error || '取消申請失敗。');
        }

        alert(result.message || '已取消申請。');
        await main();

      } catch (error) {
        alert('取消失敗：' + error.message);
        console.error(error);
      } finally {
        setButtonsDisabled(false);
        hideLoading();
      }
    }

    async function callGasApi(action, payload) {
      const accessToken = liff.getAccessToken();

      if (!accessToken) {
        throw new Error('無法取得 LINE access token，請重新開啟頁面。');
      }

      const body = {
        action,
        access_token: accessToken,
        ...payload
      };

      const response = await fetch(CONFIG.GAS_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(body),
        redirect: 'follow'
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error('GAS 回傳內容不是 JSON：' + text.slice(0, 200));
      }
    }

    function resetView() {
      loading.classList.remove('hidden');
      statusBox.classList.add('hidden');
      bindForm.classList.add('hidden');
      pendingBox.classList.add('hidden');
      reloadBox.classList.add('hidden');
    }

    function showLoading(message) {
      loading.textContent = message;
      loading.classList.remove('hidden');
    }

    function hideLoading() {
      loading.classList.add('hidden');
    }

    function showStatus(message, type) {
      statusBox.innerHTML = message;
      statusBox.className = 'status-box';

      if (type === 'success') {
        statusBox.classList.add('status-success');
      } else if (type === 'warning') {
        statusBox.classList.add('status-warning');
      } else if (type === 'error') {
        statusBox.classList.add('status-error');
      }

      statusBox.classList.remove('hidden');
    }

    function setButtonsDisabled(disabled) {
      submitBtn.disabled = disabled;
      cancelBtn.disabled = disabled;
      reloadBtn.disabled = disabled;
    }

    function normalize(value) {
      return String(value || '').trim().toLowerCase();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
